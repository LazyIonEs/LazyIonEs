proxy-groups:
  # === 逻辑策略组 ===
  - name: 全球加速
    icon: https://testingcf.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Proxy.png
    type: select
    proxies:
      - 香港节点
      - 台湾节点
      - 日本节点
      - 狮城节点
      - 韩国节点
      - 美国节点
      - 特殊节点
      - 手动切换
      - DIRECT

  - name: 苹果服务
    icon: https://testingcf.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Apple.png
    type: select
    proxies:
      - 香港节点
      - 台湾节点
      - 日本节点
      - 狮城节点
      - 韩国节点
      - 美国节点
      - 特殊节点
      - 手动切换
      - DIRECT

  - name: 谷歌服务
    icon: https://testingcf.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Google_Search.png
    type: select
    proxies:
      - 香港节点
      - 台湾节点
      - 日本节点
      - 狮城节点
      - 韩国节点
      - 美国节点
      - 特殊节点
      - 手动切换
      - DIRECT

  - name: 微软服务
    icon: https://testingcf.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Microsoft.png
    type: select
    proxies:
      - 香港节点
      - 台湾节点
      - 日本节点
      - 狮城节点
      - 韩国节点
      - 美国节点
      - 特殊节点
      - 手动切换
      - DIRECT

  - name: 智能助理
    icon: https://testingcf.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Bot.png
    type: select
    proxies:
      - 香港节点
      - 台湾节点
      - 日本节点
      - 狮城节点
      - 韩国节点
      - 美国节点
      - 特殊节点
      - 手动切换
      - DIRECT

  - name: 电报代理
    icon: https://testingcf.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Telegram.png
    type: select
    proxies:
      - 香港节点
      - 台湾节点
      - 日本节点
      - 狮城节点
      - 韩国节点
      - 美国节点
      - 特殊节点
      - 手动切换
      - DIRECT

  - name: 国外媒体
    icon: https://testingcf.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/ForeignMedia.png
    type: select
    proxies:
      - 香港节点
      - 台湾节点
      - 日本节点
      - 狮城节点
      - 韩国节点
      - 美国节点
      - 特殊节点
      - 手动切换
      - DIRECT

  - name: 游戏平台
    icon: https://testingcf.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Game.png
    type: select
    proxies:
      - 香港节点
      - 台湾节点
      - 日本节点
      - 狮城节点
      - 韩国节点
      - 美国节点
      - 特殊节点
      - 手动切换
      - DIRECT

  - name: 国内媒体
    icon: https://testingcf.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/DomesticMedia.png
    type: select
    proxies:
      - 香港节点
      - 台湾节点
      - 日本节点
      - 狮城节点
      - 韩国节点
      - 美国节点
      - 特殊节点
      - 手动切换
      - DIRECT

  - name: 国内直连
    icon: https://testingcf.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Direct.png
    type: select
    proxies:
      - 全球加速
      - 手动切换
      - DIRECT

  - name: 漏网之鱼
    icon: https://testingcf.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Final.png
    type: select
    proxies:
      - 全球加速
      - 手动切换
      - DIRECT

  # === 节点筛选策略组 ===
  - name: 香港节点
    icon: https://testingcf.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Hong_Kong.png
    type: url-test
    include-all: true
    filter: (?i)(港|HK|hk|Hong Kong|HongKong|hongkong)
    interval: 300
    tolerance: 50

  - name: 台湾节点
    icon: https://testingcf.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Taiwan.png
    type: url-test
    include-all: true
    filter: (?i)(台|新北|彰化|TW|Taiwan)
    interval: 300
    tolerance: 50

  - name: 日本节点
    icon: https://testingcf.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Japan.png
    type: url-test
    include-all: true
    filter: (?i)(日本|川日|东京|大阪|泉日|埼玉|沪日|深日|JP|Japan)
    interval: 300
    tolerance: 50

  - name: 狮城节点
    icon: https://testingcf.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Singapore.png
    type: url-test
    include-all: true
    filter: (?i)(新加坡|坡|狮城|SG|Singapore)
    interval: 300
    tolerance: 50

  - name: 韩国节点
    icon: https://testingcf.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Korea.png
    type: url-test
    include-all: true
    filter: (?i)(KR|Korea|KOR|首尔|韩|韓)
    interval: 300
    tolerance: 50

  - name: 美国节点
    icon: https://testingcf.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/United_States.png
    type: url-test
    include-all: true
    filter: (?i)(美|波特兰|达拉斯|俄勒冈|凤凰城|费利蒙|硅谷|拉斯维加斯|洛杉矶|圣何塞|圣克拉拉|西雅图|芝加哥|US|United States)
    interval: 300
    tolerance: 150

  - name: 特殊节点
    icon: https://testingcf.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Server.png
    type: select
    include-all: true
    # 过滤掉流量信息和常规地区节点
    filter: '^(?!.*\d+(?:\.\d+)?\s*G\s*\|\s*\d+(?:\.\d+)?\s*G)(?!.*(?:港|台|日|新|韩|美|HK|TW|JP|SG|KR|US|Hong|Tai|Japan|Korea|Singapore|States|Traffic Reset|Expire Date)).*$'

  - name: 手动切换
    icon: https://testingcf.jsdelivr.net/gh/shindgewongxj/WHATSINStash@master/icon/select.png
    type: select
    include-all: true

